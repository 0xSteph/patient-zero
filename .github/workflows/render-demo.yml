name: render-demo

# Renders docs/assets/demo.gif from docs/assets/demo.tape via VHS.
#
# We install ffmpeg + ttyd + vhs manually rather than using
# charmbracelet/vhs-action because the action's bundled ffmpeg install step
# has been failing intermittently on Ubuntu runners as of 2026-05.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'docs/assets/demo.tape'
      - 'docs/assets/demo-project/**'
      - 'docs/assets/demo-iocs.json'

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      - name: Install ffmpeg + ttyd (system deps for VHS)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          # ttyd from a release binary (no apt package on Ubuntu 24.04)
          curl -fsSL -o /tmp/ttyd "https://github.com/tsl0922/ttyd/releases/latest/download/ttyd.x86_64"
          sudo install -m 0755 /tmp/ttyd /usr/local/bin/ttyd
          ttyd --version

      - name: Install VHS
        run: |
          VHS_VERSION=$(curl -fsSL https://api.github.com/repos/charmbracelet/vhs/releases/latest | jq -r .tag_name)
          echo "Installing VHS ${VHS_VERSION}"
          curl -fsSL -o /tmp/vhs.tar.gz "https://github.com/charmbracelet/vhs/releases/download/${VHS_VERSION}/vhs_${VHS_VERSION#v}_Linux_x86_64.tar.gz"
          mkdir -p /tmp/vhs
          # VHS tarball has a top-level dir like vhs_<ver>_Linux_x86_64/
          tar -xzf /tmp/vhs.tar.gz -C /tmp/vhs --strip-components=1
          sudo install -m 0755 /tmp/vhs/vhs /usr/local/bin/vhs
          vhs --version

      - name: Render demo.gif
        run: vhs docs/assets/demo.tape

      - name: Commit refreshed demo.gif if changed
        run: |
          git config user.name 'patient-zero-demo[bot]'
          git config user.email '0xSteph+patient-zero@users.noreply.github.com'
          if [[ -n "$(git status --porcelain docs/assets/demo.gif)" ]]; then
            git add docs/assets/demo.gif
            git commit -m "docs: refresh demo.gif"
            git push
          else
            echo "demo.gif unchanged; nothing to commit."
          fi
