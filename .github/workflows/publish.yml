name: publish

on:
  push:
    tags:
      - 'v*'           # e.g. v0.1.0, v0.1.0-pre.1
  workflow_dispatch:

permissions:
  contents: read
  id-token: write      # for npm provenance

jobs:
  publish:
    name: publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - run: npm ci
      - run: npm test
      # Bundle a fresh IoC snapshot so --offline works at npm-install time
      - name: Refresh bundled IoCs
        run: node aggregator/build.js --manual-only

      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public
